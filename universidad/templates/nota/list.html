{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Lista de Notas</h2>

    <a href="{% url 'alumno:nota_create' %}" class="btn btn-primary mb-3">
        Nueva Nota
    </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Alumno</th>
                <th>Curso</th>
                <th>Nota</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for nota in notas %}
            <tr>
                <td>{{ nota.inscripcion.alumno }}</td>
                <td>{{ nota.inscripcion.asignacion.curso.nombre }}</td>
                <td>{{ nota.nota }}</td>
                <td>
                    <a href="{% url 'alumno:nota_edit' nota.pk %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'alumno:nota_delete' nota.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No hay notas registradas.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
